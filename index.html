<!DOCTYPE html>
<html>
<head>
  <title>WWII Craft</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #4B5320;
      --paper: #1c1a14;
      --gold: #c9a84c;
      --red: #8b1a1a;
      --red-bright: #cc2222;
      --text: #e8dfc0;
      --muted: #7a7060;
      --border: #3a3020;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Special Elite', cursive;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ============================
       TITLE SCREEN
    ============================ */
    #titleScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(139,26,26,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(139,26,26,0.1) 0%, transparent 60%),
        var(--bg);
    }

    /* Animated scanlines */
    #titleScreen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    .title-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px 20px;
    }

    .title-stamp {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(56px, 12vw, 110px);
      color: var(--gold);
      letter-spacing: 8px;
      line-height: 0.9;
      text-shadow:
        4px 4px 0px var(--red),
        8px 8px 0px rgba(139,26,26,0.4),
        0 0 60px rgba(201,168,76,0.2);
      animation: flicker 6s infinite;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.85; }
      97% { opacity: 1; }
      98% { opacity: 0.9; }
    }

    .title-sub {
      font-family: 'Special Elite', cursive;
      font-size: clamp(13px, 2.5vw, 18px);
      color: var(--muted);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-top: 8px;
      margin-bottom: 40px;
    }

    /* Scene illustration */
    .title-scene {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 30px;
      margin: 20px 0 40px;
      flex-wrap: wrap;
    }

    .scene-figure {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      animation: fadeUp 1s ease both;
    }

    .scene-figure:nth-child(1) { animation-delay: 0.2s; }
    .scene-figure:nth-child(2) { animation-delay: 0.5s; }
    .scene-figure:nth-child(3) { animation-delay: 0.8s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .scene-icon {
      font-size: clamp(48px, 10vw, 80px);
      filter: drop-shadow(0 4px 12px rgba(201,168,76,0.3));
    }

    .scene-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .plus-sign {
      font-size: 32px;
      color: var(--red);
      margin-bottom: 30px;
      font-family: 'Oswald', sans-serif;
    }

    /* Divider */
    .title-divider {
      width: 300px;
      max-width: 80vw;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 10px auto 30px;
    }

    .crafting-hint {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 40px;
    }

    .crafting-hint strong {
      color: var(--gold);
    }

    /* Start button */
    #startBtn {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      letter-spacing: 6px;
      padding: 16px 52px;
      background: transparent;
      color: var(--gold);
      border: 2px solid var(--gold);
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    #startBtn::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(201,168,76,0.3);
      transition: all 0.2s;
    }

    #startBtn:hover {
      background: var(--red);
      border-color: var(--red-bright);
      color: #fff;
      box-shadow: 0 0 30px rgba(204,34,34,0.4);
    }

    #startBtn:hover::before {
      border-color: rgba(255,255,255,0.2);
    }

    .corner-decoration {
      position: absolute;
      width: 60px;
      height: 60px;
      border-color: rgba(201,168,76,0.25);
      border-style: solid;
    }
    .corner-decoration.tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
    .corner-decoration.tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
    .corner-decoration.bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
    .corner-decoration.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

    /* ============================
       GAME SCREEN
    ============================ */
    #gameScreen {
      display: none;
      min-height: 100vh;
      padding: 20px;
      background:
        radial-gradient(ellipse at top, rgba(139,26,26,0.08) 0%, transparent 50%),
        var(--bg);
    }

    .game-header {
      text-align: center;
      padding: 20px 0 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
    }

    .game-title {
      font-family: 'Oswald', sans-serif;
      font-size: 36px;
      color: var(--gold);
      letter-spacing: 6px;
      text-shadow: 2px 2px 0 var(--red);
    }

    .game-subtitle {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 4px;
      margin-top: 4px;
    }

    /* ============================
       DRAG HINT BAR
    ============================ */
    .drag-hint {
      max-width: 760px;
      margin: 0 auto 14px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .drag-hint span { color: var(--gold); }

    /* ============================
       ELEMENT GRID
    ============================ */
    .elements-panel {
      max-width: 760px;
      margin: 0 auto 24px;
      background: var(--paper);
      border: 1px solid var(--border);
      padding: 20px 16px 16px;
      position: relative;
    }

    .elements-panel::before {
      content: 'ELEMENTS — DRAG ONE ONTO ANOTHER TO COMBINE';
      position: absolute;
      top: -10px;
      left: 20px;
      background: var(--paper);
      padding: 0 10px;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gold);
    }

    .elements-search {
      width: 100%;
      font-family: 'Special Elite', cursive;
      font-size: 13px;
      padding: 8px 12px;
      background: #0d0d0d;
      color: var(--text);
      border: 1px solid var(--border);
      margin-bottom: 14px;
      outline: none;
    }
    .elements-search:focus { border-color: var(--gold); }
    .elements-search::placeholder { color: var(--muted); }

    .elements-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
      max-height: 340px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .elements-grid::-webkit-scrollbar { width: 4px; }
    .elements-grid::-webkit-scrollbar-track { background: #0d0d0d; }
    .elements-grid::-webkit-scrollbar-thumb { background: var(--border); }

    .element-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 10px 6px 8px;
      background: #0d0d0d;
      border: 1px solid var(--border);
      cursor: grab;
      transition: border-color 0.15s, background 0.15s, transform 0.12s, box-shadow 0.15s;
      user-select: none;
      min-height: 72px;
      position: relative;
    }

    .element-tile:hover {
      border-color: var(--gold);
      background: rgba(201,168,76,0.07);
      transform: translateY(-2px);
    }

    /* While being dragged */
    .element-tile.dragging {
      opacity: 0.35;
      cursor: grabbing;
      transform: scale(0.96);
    }

    /* Valid drop target while something is being dragged over it */
    .element-tile.drag-over {
      border-color: var(--gold);
      background: rgba(201,168,76,0.22);
      box-shadow: 0 0 18px rgba(201,168,76,0.45);
      transform: scale(1.06);
      z-index: 2;
    }

    .element-tile.new-glow {
      animation: newGlow 1.4s ease both;
    }

    @keyframes newGlow {
      0%   { box-shadow: 0 0 0 rgba(201,168,76,0); border-color: var(--gold); background: rgba(201,168,76,0.3); }
      50%  { box-shadow: 0 0 30px rgba(201,168,76,0.7); }
      100% { box-shadow: 0 0 0 rgba(201,168,76,0); border-color: var(--border); background: #0d0d0d; }
    }

    /* Ghost clone that follows the cursor */
    #dragGhost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 80px;
      height: 72px;
      background: var(--paper);
      border: 2px solid var(--gold);
      box-shadow: 0 8px 28px rgba(0,0,0,0.6), 0 0 20px rgba(201,168,76,0.3);
      transform: translate(-50%, -50%) rotate(3deg) scale(1.1);
    }
    #dragGhost .ghost-emoji { font-size: 26px; line-height: 1; }
    #dragGhost .ghost-name  { font-size: 9px; color: var(--gold); text-align: center; padding: 0 4px; letter-spacing: 0.5px; line-height: 1.3; }

    .tile-emoji { font-size: 24px; line-height: 1; }
    .tile-name  {
      font-size: 9.5px;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-align: center;
      line-height: 1.3;
      word-break: break-word;
    }
    .element-tile:hover .tile-name { color: var(--text); }

    /* Flash result feedback */
    .combine-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--paper);
      border: 2px solid var(--gold);
      padding: 18px 32px;
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      color: var(--gold);
      letter-spacing: 3px;
      text-align: center;
      z-index: 500;
      pointer-events: none;
      animation: flashIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes flashIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* Discoveries counter */
    .stats-bar {
      max-width: 700px;
      margin: 0 auto 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .discovery-count {
      color: var(--gold);
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
    }

    /* Log */
    #log {
      max-width: 700px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--border);
      padding: 16px;
      height: 260px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.8;
      position: relative;
    }

    #log::before {
      content: 'MISSION LOG';
      display: block;
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--gold);
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    #log::-webkit-scrollbar { width: 4px; }
    #log::-webkit-scrollbar-track { background: #0d0d0d; }
    #log::-webkit-scrollbar-thumb { background: var(--border); }

    .log-entry { margin-bottom: 4px; }
    .log-success { color: #6dbf6d; }
    .log-warn { color: var(--gold); }
    .log-fail { color: var(--red-bright); }
    .log-desc { color: #a09070; font-style: italic; padding-left: 16px; border-left: 2px solid var(--border); margin: 4px 0 8px; }
    .log-system { color: var(--muted); }

    /* Back button */
    #backBtn {
      font-family: 'Special Elite', cursive;
      font-size: 12px;
      letter-spacing: 2px;
      padding: 8px 18px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      cursor: pointer;
      position: fixed;
      top: 16px;
      left: 16px;
      transition: color 0.2s, border-color 0.2s;
    }

    #backBtn:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    /* ============================
       DISCOVERY POPUP
    ============================ */
    #popupOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #popupOverlay.active {
      display: flex;
      animation: overlayIn 0.25s ease;
    }

    @keyframes overlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #popupBox {
      background: var(--paper);
      border: 1px solid var(--gold);
      max-width: 520px;
      width: 100%;
      padding: 36px 32px 28px;
      position: relative;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Corner accents */
    #popupBox::before, #popupBox::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.5;
    }
    #popupBox::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
    #popupBox::after  { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

    .popup-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .popup-formula {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(13px, 3vw, 17px);
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .popup-formula span {
      color: var(--text);
    }

    .popup-formula .pop-result {
      color: var(--gold);
    }

    .popup-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 16px 0;
    }

    .popup-result-title {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(20px, 5vw, 28px);
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 14px;
      text-shadow: 1px 1px 0 var(--red);
    }

    .popup-description {
      font-size: 14px;
      line-height: 1.75;
      color: #a09070;
      font-style: italic;
    }

    #popupClose {
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      letter-spacing: 4px;
      padding: 10px 28px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      cursor: pointer;
      margin-top: 24px;
      display: block;
      width: 100%;
      transition: background 0.2s, border-color 0.2s;
    }

    #popupClose:hover {
      background: var(--red);
      border-color: var(--red-bright);
    }
  </style>
</head>

<body>

<!-- ============================
     TITLE SCREEN
============================ -->
<div id="titleScreen">
  <div class="corner-decoration tl"></div>
  <div class="corner-decoration tr"></div>
  <div class="corner-decoration bl"></div>
  <div class="corner-decoration br"></div>

  <div class="title-content">
    <div class="title-stamp">WWII<br>CRAFT</div>
    <div class="title-sub">Discover History Through Combination</div>

    <div class="title-divider"></div>

    <div class="title-scene">
      <div class="scene-figure">
        <div class="scene-icon">🗾</div>
        <div class="scene-label">Japan</div>
      </div>
      <div class="plus-sign">+</div>
      <div class="scene-figure">
        <div class="scene-icon">💣</div>
        <div class="scene-label">Atomic Bomb</div>
      </div>
      <div class="plus-sign">=</div>
      <div class="scene-figure">
        <div class="scene-icon">🏳️</div>
        <div class="scene-label">Surrender</div>
      </div>
    </div>

    <div class="title-divider"></div>

    <div class="crafting-hint">
      Drag one element onto another — unlock <strong>25 historical events</strong>
    </div>

    <button id="startBtn" onclick="startGame()">▶ &nbsp; BEGIN</button>
  </div>
</div>

<!-- ============================
     GAME SCREEN
============================ -->
<div id="gameScreen">
  <button id="backBtn" onclick="goBack()">← MENU</button>

  <div class="game-header">
    <div class="game-title">WWII CRAFT</div>
    <div class="game-subtitle">Combine elements · Discover history</div>
  </div>

  <div class="stats-bar">
    <span>DISCOVERIES</span>
    <span class="discovery-count" id="discoveryCount">0 / 25</span>
  </div>

  <!-- Element grid -->
  <div class="elements-panel">
    <input class="elements-search" id="elemSearch" type="text" placeholder="Search elements…" oninput="renderGrid()">
    <div class="elements-grid" id="elemGrid"></div>
  </div>

  <div id="log"></div>
</div>

<!-- Drag ghost (follows cursor) -->
<div id="dragGhost">
  <div class="ghost-emoji" id="ghostEmoji"></div>
  <div class="ghost-name" id="ghostName"></div>
</div>

<!-- ============================
     DISCOVERY POPUP
============================ -->
<div id="popupOverlay" onclick="closePopup(event)">
  <div id="popupBox">
    <div class="popup-label">✅ New Discovery</div>
    <div class="popup-formula">
      <span id="popEl1"></span>
      &nbsp;+&nbsp;
      <span id="popEl2"></span>
      &nbsp;=&nbsp;
      <span class="pop-result" id="popResult"></span>
    </div>
    <div class="popup-divider"></div>
    <div class="popup-result-title" id="popResultTitle"></div>
    <div class="popup-description" id="popDesc"></div>
    <button id="popupClose" onclick="closePopup()">CONTINUE</button>
  </div>
</div>

<script>
// ----------------------------
// DATA
// ----------------------------
let discovered = new Set([
  " ", "Bomb", "Atom", "Uranium", "Plutonium", "Surrender", "USS Missouri",
  "Letter to Roosevelt", "Poland", "Japan", "Germany", "Soviet Union",
  "Egypt", "England", "United States Navy", "Japanese Navy", "United States",
  "German Capital", "Allies", "Nagasaki", "East Germany", "Pearl Harbor",
  "Operation Barbarossa", "Operation Uranus", "Hitler", "Emperor Hirohito",
  "Albert Einstein", "Harry Truman", "Winston Churchill",
  "August 6th, 1945", "August 9th, 1945", "June 22nd, 1941"
]);

let recipes = [
  { id: "1",  a: "Atom",               b: "Bomb",                 result: "Atomic Bomb" },
  { id: "2",  a: "Bomb",               b: "Pearl Harbor",         result: "America joining War" },
  { id: "3",  a: "Atomic Bomb",        b: "Japan",                result: "Japan Surrenders" },
  { id: "4",  a: "Germany",            b: "Poland",               result: "Invasion of Poland" },
  { id: "5",  a: "Germany",            b: "Soviet Union",         result: "The Nazi-Soviet Pact" },
  { id: "6",  a: "Soviet Union",       b: "Poland",               result: "Soviet Invasion of Poland" },
  { id: "7",  a: "United States Navy", b: "Japanese Navy",        result: "Battle of Midway" },
  { id: "8",  a: "England",            b: "Egypt",                result: "Battle of El Alamein" },

  { id: "10", a: "Hitler",             b: "Soviet Union",         result: "Death of Hitler" },
  { id: "11", a: "Emperor Hirohito",   b: "Potsdam Declaration",  result: "Japanese Surrender Announcement" },
  { id: "12", a: "Surrender",          b: "USS Missouri",         result: "Formal Surrender of Japan" },
  { id: "13", a: "Soviet Union",       b: "German Capital",       result: "Battle of Berlin" },
  { id: "14", a: "Allies",             b: "Potsdam Declaration",  result: "Trying to get Japan to Surrender" },
  { id: "15", a: "Atomic Bomb",        b: "Nagasaki",             result: "Second Atom Bomb Dropped on Japan" },
  { id: "16", a: "Albert Einstein",    b: "Letter to Roosevelt",  result: "Project Y" },
  { id: "17", a: "Uranium",            b: "Atomic Bomb",          result: "Little Boy" },
  { id: "18", a: "Plutonium",          b: "Atomic Bomb",          result: "Fat Man" },
  { id: "19", a: "Little Boy",         b: "August 6th, 1945",     result: "Bombing of Hiroshima" },
  { id: "20", a: "Fat Man",            b: "August 9th, 1945",     result: "Bombing of Nagasaki" },
  { id: "21", a: "United States",      b: "Soviet Union",         result: "High Tensions" },
  { id: "22", a: "East Germany",       b: "Soviet Union",         result: "Berlin Wall" },
  { id: "23", a: "Harry Truman",       b: "Winston Churchill",    result: "Potsdam Declaration" },
  { id: "24", a: "Operation Barbarossa", b: "June 22nd, 1941",   result: "Nazi Betrayal: Invasion of Soviet Union" },
  { id: "25", a: "Soviet Union",       b: "Operation Uranus",     result: "Circling the German 6th Army" },
];

let descriptions = [
  { id: "1",  description: "The Atomic bombings of Hiroshima and Nagasaki were the first use of nuclear weapons in warfare. Scientists developed the atomic bomb through the Manhattan Project during World War II. These bombs released massive destructive energy from splitting atoms, changing warfare forever." },

let discoveredCount = 0;

// Emoji map
const emojiMap = {

  "Operation Uranus": "🔄", "Hitler": "☠️", "Emperor Hirohito": "👑",
  "Albert Einstein": "🔬", "Harry Truman": "🎖️", "Winston Churchill": "🎩",
  "August 6th, 1945": "📅", "August 9th, 1945": "📅", "June 22nd, 1941": "📅",
  "Atomic Bomb": "☢️", "America joining War": "🦅", "Japan Surrenders": "🏳️",
  "Invasion of Poland": "⚔️", "The Nazi-Soviet Pact": "🤝",

  "Trying to get Japan to Surrender": "📢", "Second Atom Bomb Dropped on Japan": "💥",
  "Project Y": "🔭", "Little Boy": "💣", "Fat Man": "💣",
  "Bombing of Hiroshima": "☁️", "Bombing of Nagasaki": "☁️", "High Tensions": "⚡",
  "Berlin Wall": "🧱", "Potsdam Declaration": "📜",
  "Nazi Betrayal: Invasion of Soviet Union": "🗡️", "Circling the German 6th Army": "🔄",
};
function getEmoji(name) { return emojiMap[name] || "📌"; }

// ----------------------------
// DRAG STATE
// ----------------------------
let dragName = null;      // name of element being dragged
let dragSourceEl = null;  // the tile DOM element being dragged

// ----------------------------
// SCREEN TRANSITIONS
// ----------------------------
function startGame() {
  document.getElementById("titleScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";
  renderGrid();
  updateCount();
  log("Game Started — drag one element onto another to combine.", "system");
}

function goBack() {
  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("titleScreen").style.display = "flex";
  dragName = null;
}

// ----------------------------
// GRID RENDER
// ----------------------------
function renderGrid() {
  const grid = document.getElementById("elemGrid");
  const query = (document.getElementById("elemSearch").value || "").toLowerCase();
  grid.innerHTML = "";

  let sorted = [...discovered].filter(n => n.trim() !== "").sort();
  if (query) sorted = sorted.filter(n => n.toLowerCase().includes(query));

  sorted.forEach(name => {
    const tile = document.createElement("div");
    tile.className = "element-tile";
    tile.dataset.name = name;
    tile.draggable = true;
    tile.innerHTML = `<div class="tile-emoji">${getEmoji(name)}</div><div class="tile-name">${name}</div>`;

    // ---- Mouse drag events ----
    tile.addEventListener("dragstart", onDragStart);
    tile.addEventListener("dragend",   onDragEnd);
    tile.addEventListener("dragover",  onDragOver);
    tile.addEventListener("dragleave", onDragLeave);
    tile.addEventListener("drop",      onDrop);

    // ---- Touch drag events ----
    tile.addEventListener("touchstart", onTouchStart, { passive: true });
    tile.addEventListener("touchmove",  onTouchMove,  { passive: false });
    tile.addEventListener("touchend",   onTouchEnd);

    grid.appendChild(tile);
  });
}

// ----------------------------
// MOUSE DRAG HANDLERS
// ----------------------------
function onDragStart(e) {
  dragName = this.dataset.name;
  dragSourceEl = this;
  this.classList.add("dragging");

  // Invisible default ghost (we use CSS ghost div instead)
  const blank = document.createElement("canvas");
  blank.width = blank.height = 1;
  e.dataTransfer.setDragImage(blank, 0, 0);
  e.dataTransfer.effectAllowed = "move";

  // Show custom ghost
  const ghost = document.getElementById("dragGhost");
  document.getElementById("ghostEmoji").textContent = getEmoji(dragName);
  document.getElementById("ghostName").textContent = dragName;
  ghost.style.display = "flex";
  moveGhost(e.clientX, e.clientY);
}

function onDragEnd(e) {
  this.classList.remove("dragging");
  document.getElementById("dragGhost").style.display = "none";
  // Clean up any leftover drag-over highlights
  document.querySelectorAll(".element-tile.drag-over").forEach(t => t.classList.remove("drag-over"));
  dragName = null;
  dragSourceEl = null;
}

function onDragOver(e) {
  e.preventDefault();
  if (this !== dragSourceEl) {
    this.classList.add("drag-over");
  }
  moveGhost(e.clientX, e.clientY);
}

function onDragLeave(e) {
  this.classList.remove("drag-over");
}

function onDrop(e) {
  e.preventDefault();
  this.classList.remove("drag-over");
  if (!dragName || this === dragSourceEl) return;
  combineItems(dragName, this.dataset.name);
}

function moveGhost(x, y) {
  const ghost = document.getElementById("dragGhost");
  ghost.style.left = x + "px";
  ghost.style.top  = y + "px";
}

// Also move ghost on mousemove during drag (dragover fires only on targets)
document.addEventListener("dragover", e => {
  if (dragName) moveGhost(e.clientX, e.clientY);
});

// ----------------------------
// TOUCH DRAG HANDLERS
// ----------------------------
let touchDragName = null;
let touchSourceEl = null;
let lastTouchTarget = null;

function onTouchStart(e) {
  touchDragName = this.dataset.name;
  touchSourceEl = this;
  this.classList.add("dragging");

  const ghost = document.getElementById("dragGhost");
  document.getElementById("ghostEmoji").textContent = getEmoji(touchDragName);
  document.getElementById("ghostName").textContent = touchDragName;
  ghost.style.display = "flex";
  const t = e.touches[0];
  moveGhost(t.clientX, t.clientY);
}

function onTouchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  moveGhost(t.clientX, t.clientY);

  // Find the element under the finger
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const tile = el ? el.closest(".element-tile") : null;

  if (lastTouchTarget && lastTouchTarget !== tile) {
    lastTouchTarget.classList.remove("drag-over");
  }
  if (tile && tile !== touchSourceEl) {
    tile.classList.add("drag-over");
    lastTouchTarget = tile;
  } else {
    lastTouchTarget = null;
  }
}

function onTouchEnd(e) {
  this.classList.remove("dragging");
  document.getElementById("dragGhost").style.display = "none";
  document.querySelectorAll(".element-tile.drag-over").forEach(t => t.classList.remove("drag-over"));

  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const tile = el ? el.closest(".element-tile") : null;

  if (tile && tile !== touchSourceEl && touchDragName) {
    combineItems(touchDragName, tile.dataset.name);
  }

  touchDragName = null;
  touchSourceEl = null;
  lastTouchTarget = null;
}

// ----------------------------
// DISCOVERY COUNTER
// ----------------------------
function updateCount() {
  document.getElementById("discoveryCount").textContent = discoveredCount + " / 25";
}

// ----------------------------
// DESCRIPTION LOOKUP
// ----------------------------
function getDescriptionById(id) {
  const match = descriptions.find(d => d.id === id);
  return match ? match.description : "No description found.";
}

// ----------------------------
// LOG
// ----------------------------
function log(message, type) {
  const logDiv = document.getElementById("log");
  const entry = document.createElement("div");
  entry.className = "log-entry";
  if      (type === "success") entry.classList.add("log-success");
  else if (type === "warn")    entry.classList.add("log-warn");
  else if (type === "fail")    entry.classList.add("log-fail");
  else if (type === "desc")    entry.classList.add("log-desc");
  else                         entry.classList.add("log-system");
  entry.textContent = message;
  logDiv.appendChild(entry);
  logDiv.scrollTop = logDiv.scrollHeight;
}

// ----------------------------
// POPUP
// ----------------------------
function showPopup(el1, el2, result, description) {
  document.getElementById("popEl1").textContent = el1;
  document.getElementById("popEl2").textContent = el2;
  document.getElementById("popResult").textContent = result;
  document.getElementById("popResultTitle").textContent = result;
  document.getElementById("popDesc").textContent = description;
  document.getElementById("popupOverlay").classList.add("active");
}

function closePopup(event) {
  if (!event || event.target === document.getElementById("popupOverlay") || event.target === document.getElementById("popupClose")) {
    document.getElementById("popupOverlay").classList.remove("active");
  }
}

// ----------------------------
// COMBINE
// ----------------------------
function combineItems(item1, item2) {
  log("Combining: " + item1 + " + " + item2, "system");

  const recipe = recipes.find(r =>
    (r.a === item1 && r.b === item2) ||
    (r.a === item2 && r.b === item1)
  );

  if (recipe) {
    if (!discovered.has(recipe.result)) {
      discovered.add(recipe.result);
      discoveredCount++;
      const desc = getDescriptionById(recipe.id);
      log("✅ New Discovery: " + recipe.result, "success");
      log("📖 " + desc, "desc");
      updateCount();
      renderGrid();

      // Glow new tile
      setTimeout(() => {
        document.querySelectorAll(".element-tile").forEach(t => {
          if (t.dataset.name === recipe.result) t.classList.add("new-glow");
        });
      }, 60);

      showPopup(item1, item2, recipe.result, desc);

      if (discoveredCount === 25) {
        log("🎖️ All 25 events discovered! You've mastered WWII history!", "warn");
      }
    } else {
      log("⚠️ Already discovered: " + recipe.result, "warn");
    }
  } else {
    log("❌ No combination found.", "fail");
  }
}
</script>
